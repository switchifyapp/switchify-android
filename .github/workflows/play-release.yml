name: Play Release

# Fires whenever a GitHub Release is published from the AGENTS.md release flow
# (`gh release create vX.Y.Z --generate-notes`). Pre-releases — tagged with
# any of the standard suffixes like `-rc.1`, `-beta.1`, `-alpha.1` and marked
# `--prerelease` on the GitHub UI/CLI — are skipped by the job-level guard so
# only real production releases reach Play.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-play:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out released tag
        uses: actions/checkout@v4
        with:
          # Checkout the exact tag the release was published from so
          # `gitVersionCode = rev-list --count HEAD` matches what was tagged.
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" \
            | base64 --decode > "$RUNNER_TEMP/upload.jks"

      - name: Build signed release AAB
        env:
          UPLOAD_KEYSTORE_PATH:     ${{ runner.temp }}/upload.jks
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS:         ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD:      ${{ secrets.UPLOAD_KEY_PASSWORD }}
          REVENUECAT_PUBLIC_KEY:    ${{ secrets.REVENUECAT_PUBLIC_KEY }}
          TIMBERLOGS_API_KEY:       ${{ secrets.TIMBERLOGS_API_KEY }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:        ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID:     ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.enaboapps.switchify
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          # Curated release notes per locale (≤ 500 chars). Edit this file
          # before publishing the GitHub Release. Skipped if the directory
          # is empty.
          whatsNewDirectory: app/src/main/play/release-notes
          releaseName: ${{ github.event.release.tag_name }}

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.jks"
