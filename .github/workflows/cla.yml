name: CLA Assistant

# Enforces that every contributor has signed the Switchify CLA (CLA.md) before
# their PR can be merged. Signatures are stored in a separate private repo so
# the public repo doesn't accumulate signature blobs.
#
# One-time setup required for this workflow to actually run:
#   1. Create a private repo to store signatures (e.g. enaboapps/switchify-cla-signatures)
#      with an initial commit on `main`.
#   2. Create a fine-grained Personal Access Token with read+write access to that
#      signatures repo's contents.
#   3. Add the token as a repository secret named `CLA_PAT` on the Switchify repo.
#   4. Update `remote-organization-name` / `remote-repository-name` below if you
#      use a different name than `switchify-cla-signatures`.
#
# Until the signatures repo and CLA_PAT secret exist, this workflow will fail on
# every PR. Either complete the setup or disable the workflow until you're ready
# to accept external contributions.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/enaboapps/Switchify/blob/main/CLA.md'
          branch: 'main'
          # Project maintainers and trusted bots are exempt from signing.
          allowlist: enaboapps,dependabot[bot],github-actions[bot]
          remote-organization-name: enaboapps
          remote-repository-name: switchify-cla-signatures
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
